<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Notes</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- HOME -->
<div id="home">
  <p class="home-eyebrow">resumo de linguagens web</p>
  <h1 class="home-h1">Dev <em>Notes</em></h1>
  <p class="home-sub">Selecione uma linguagem para começar</p>
  <div class="lang-grid" id="langGrid"></div>
</div>

<!-- DETAIL -->
<div id="detail">
  <header class="det-header">
    <button class="back-btn" onclick="goHome()">← voltar</button>
    <div class="det-lang-info">
      <div class="det-dot" id="detDot"></div>
      <span class="det-name" id="detName"></span>
    </div>
  </header>
  <div class="det-body">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content-area" id="contentArea"></main>
  </div>
</div>

<script src="script.js">
</script>
</body>
</html>

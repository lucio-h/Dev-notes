<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;--surface:#fff;--border:#e5e0d8;
  --text:#1c1917;--muted:#78716c;--radius:12px;
  --code-bg:#18181b;--lang:#1c1917;
  font-size:16px;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px
}


/* ── HOME ── */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:0}
.home-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;opacity:0;animation:fadeUp .5s .1s ease forwards}
.home-h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:700;letter-spacing:-.04em;line-height:1.1;text-align:center;margin-bottom:.5rem;opacity:0;animation:fadeUp .5s .2s ease forwards}
.home-h1 em{font-style:italic;font-weight:400}
.home-sub{color:var(--muted);font-size:.95rem;margin-bottom:3.5rem;font-weight:400;opacity:0;animation:fadeUp .5s .3s ease forwards}
.lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.875rem;width:100%;max-width:860px}
.lang-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.75rem 1.25rem 1.5rem;cursor:pointer;text-align:left;position:relative;overflow:hidden;
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
  opacity:0;animation:fadeUp .45s ease forwards;
}
.lang-card:nth-child(1){animation-delay:.15s}.lang-card:nth-child(2){animation-delay:.2s}
.lang-card:nth-child(3){animation-delay:.25s}.lang-card:nth-child(4){animation-delay:.3s}
.lang-card:nth-child(5){animation-delay:.35s}
.lang-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--lang);transform:scaleX(0);transition:transform .22s ease;transform-origin:left
}
.lang-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.09);border-color:transparent}
.lang-card:hover::after{transform:scaleX(1)}
.lc-tag{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:500;
  background:color-mix(in srgb,var(--lang) 12%,transparent);
  color:var(--lang);padding:.2rem .5rem;border-radius:4px;
  display:inline-block;margin-bottom:1.1rem
}
.lc-name{font-size:1.05rem;font-weight:600;margin-bottom:.2rem;letter-spacing:-.01em}
.lc-desc{font-size:.75rem;color:var(--muted);line-height:1.5;font-weight:400}
.lc-arrow{
  position:absolute;bottom:1.25rem;right:1.25rem;
  font-size:.9rem;color:var(--border);transition:color .2s,transform .2s
}
.lang-card:hover .lc-arrow{color:var(--lang);transform:translate(2px,-2px)}

/* ── DETAIL ── */
#detail{display:none;min-height:100vh;flex-direction:column}
#detail.active{display:flex;animation:fadeIn .35s ease}
.det-header{
  position:sticky;top:0;z-index:100;
  background:rgba(245,243,239,.93);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:.9rem 1.75rem;
  display:flex;align-items:center;gap:1rem
}
.back-btn{
  display:flex;align-items:center;gap:.5rem;
  background:none;border:1px solid var(--border);border-radius:8px;
  padding:.45rem .9rem;cursor:pointer;font-family:'Syne',sans-serif;
  font-size:.8rem;color:var(--muted);transition:all .18s
}
.back-btn:hover{color:var(--text);border-color:var(--text)}
.det-lang-info{display:flex;align-items:center;gap:.65rem;margin-left:.25rem}
.det-dot{width:8px;height:8px;border-radius:50%;background:var(--lang);flex-shrink:0}
.det-name{font-size:.95rem;font-weight:600;letter-spacing:-.01em}
.det-body{display:grid;grid-template-columns:220px 1fr;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{border-right:1px solid var(--border);padding:1.5rem .875rem;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.sb-label{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;padding:0 .5rem;display:block
}
.sb-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.55rem .75rem;border-radius:8px;cursor:pointer;
  font-size:.83rem;color:var(--muted);transition:all .15s;
  margin-bottom:1px;border:1px solid transparent;line-height:1.3
}
.sb-item:hover{background:var(--surface);color:var(--text)}
.sb-item.active{
  background:color-mix(in srgb,var(--lang) 9%,var(--surface));
  color:var(--lang);border-color:color-mix(in srgb,var(--lang) 22%,transparent);font-weight:600
}
.sb-num{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:color-mix(in srgb,var(--muted) 60%,transparent);min-width:18px}

/* ── CONTENT ── */
.content-area{padding:2.5rem 3rem;overflow-y:auto;height:calc(100vh - 57px)}
.topic-panel{display:none}
.topic-panel.active{display:block;animation:slideR .28s ease}
.tp-title{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;letter-spacing:-.035em;margin-bottom:.4rem}
.tp-sub{color:var(--muted);font-size:.9rem;line-height:1.7;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.sec{margin-bottom:2.25rem}
.sec-title{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--lang);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem
}
.sec-title::after{content:'';flex:1;height:1px;background:color-mix(in srgb,var(--lang) 20%,transparent)}
.sec-text{font-size:.9rem;line-height:1.8;color:#44403c;margin-bottom:.875rem}
.concepts{display:grid;gap:.45rem;margin-bottom:1rem}
.ci{
  display:flex;gap:.75rem;align-items:flex-start;
  padding:.7rem .9rem;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;font-size:.855rem
}
.ci-key{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  background:color-mix(in srgb,var(--lang) 11%,transparent);
  color:var(--lang);padding:.15rem .45rem;border-radius:4px;white-space:nowrap;font-weight:500;flex-shrink:0
}
.ci-val{color:var(--muted);line-height:1.55;font-size:.84rem}
.tip{
  background:color-mix(in srgb,var(--lang) 7%,var(--surface));
  border:1px solid color-mix(in srgb,var(--lang) 22%,transparent);
  border-radius:8px;padding:.8rem 1rem;font-size:.855rem;line-height:1.65;
  color:var(--text);margin-bottom:1rem
}
.tip b{color:var(--lang)}

/* ── CODE BLOCK ── */
.cb{background:var(--code-bg);border-radius:10px;margin-bottom:1.5rem;overflow:hidden}
.cb-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1rem;border-bottom:1px solid rgba(255,255,255,.07)
}
.cb-dots{display:flex;gap:5px}
.cb-dots span{width:8px;height:8px;border-radius:50%}
.cb-dots span:nth-child(1){background:#ff5f57}
.cb-dots span:nth-child(2){background:#febc2e}
.cb-dots span:nth-child(3){background:#28c840}
.cb-lang{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:.06em}
.cb-body{
  padding:1.2rem 1.5rem;font-family:'JetBrains Mono',monospace;
  font-size:.79rem;line-height:1.75;color:#e4e4e7;overflow-x:auto;
  white-space:pre
}
.ct{color:#7dd3fc}.ca{color:#86efac}.cv{color:#fcd34d}
.cs{color:#c084fc}.cp{color:#67e8f9}.cu{color:#fca5a5}
.ck{color:#f9a8d4}.cf{color:#86efac}.cn{color:#fb923c}
.cc{color:rgba(255,255,255,.3);font-style:italic}.cty{color:#93c5fd}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .lang-grid{grid-template-columns:repeat(3,1fr)}
  .det-body{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);
    padding:1rem;display:flex;flex-wrap:wrap;gap:.35rem;overflow-x:auto;white-space:nowrap}
  .sb-label{display:none}
  .sb-item{padding:.35rem .7rem;font-size:.78rem}
  .sb-num{display:none}
  .content-area{height:auto;padding:1.5rem}
}
@media(max-width:600px){
  .lang-grid{grid-template-columns:1fr 1fr}
  .home-h1{font-size:2rem}
  .content-area{padding:1.25rem}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <p class="home-eyebrow">resumo de linguagens web</p>
  <h1 class="home-h1">Dev <em>Notes</em></h1>
  <p class="home-sub">Selecione uma linguagem para começar</p>
  <div class="lang-grid" id="langGrid"></div>
</div>

<!-- DETAIL -->
<div id="detail">
  <header class="det-header">
    <button class="back-btn" onclick="goHome()">← voltar</button>
    <div class="det-lang-info">
      <div class="det-dot" id="detDot"></div>
      <span class="det-name" id="detName"></span>
    </div>
  </header>
  <div class="det-body">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content-area" id="contentArea"></main>
  </div>
</div>

<script>
// ─────────────────────────────
// HELPERS
// ─────────────────────────────
const sec = (t, ...c) => `<div class="sec"><div class="sec-title">${t}</div>${c.join('')}</div>`;
const txt = s => `<p class="sec-text">${s}</p>`;
const tip = s => `<div class="tip">${s}</div>`;
const concepts = items => `<div class="concepts">${items.map(([k,v])=>`<div class="ci"><span class="ci-key">${k}</span><span class="ci-val">${v}</span></div>`).join('')}</div>`;
const code = (lang, body) => `<div class="cb"><div class="cb-head"><div class="cb-dots"><span></span><span></span><span></span></div><span class="cb-lang">${lang}</span></div><pre class="cb-body">${body}</pre></div>`;

// ─────────────────────────────
// LANGUAGE DATA
// ─────────────────────────────
const langs = [
  {
    id:'html', tag:'.html', name:'HTML', color:'#d9480f',
    desc:'Estrutura e marcação',
    topics: [
      { id:'estrutura', name:'Estrutura do Documento',
        content: `
        <h2 class="tp-title">Estrutura do Documento</h2>
        <p class="tp-sub">Todo documento HTML tem um esqueleto base obrigatório. Entender cada parte é o primeiro passo para escrever HTML correto.</p>
        ${sec('Esqueleto base',
          txt('Um arquivo HTML sempre começa com o <code>!DOCTYPE</code> e contém as tags fundamentais que organizam metadados e conteúdo.'),
          code('html',
`<span class="ct">&lt;!DOCTYPE html&gt;</span>
<span class="ct">&lt;html</span> <span class="ca">lang</span>=<span class="cv">"pt-BR"</span><span class="ct">&gt;</span>
<span class="ct">&lt;head&gt;</span>
  <span class="ct">&lt;meta</span> <span class="ca">charset</span>=<span class="cv">"UTF-8"</span><span class="ct">&gt;</span>
  <span class="ct">&lt;meta</span> <span class="ca">name</span>=<span class="cv">"viewport"</span> <span class="ca">content</span>=<span class="cv">"width=device-width, initial-scale=1"</span><span class="ct">&gt;</span>
  <span class="ct">&lt;title&gt;</span>Título da Página<span class="ct">&lt;/title&gt;</span>
  <span class="ct">&lt;link</span> <span class="ca">rel</span>=<span class="cv">"stylesheet"</span> <span class="ca">href</span>=<span class="cv">"style.css"</span><span class="ct">&gt;</span>
<span class="ct">&lt;/head&gt;</span>
<span class="ct">&lt;body&gt;</span>
  <span class="cc">&lt;!-- conteúdo visível aqui --&gt;</span>
  <span class="ct">&lt;script</span> <span class="ca">src</span>=<span class="cv">"script.js"</span><span class="ct">&gt;&lt;/script&gt;</span>
<span class="ct">&lt;/body&gt;</span>
<span class="ct">&lt;/html&gt;</span>`)
        )}
        ${sec('Head vs Body',
          concepts([
            ['&lt;head&gt;', 'Contém metadados invisíveis: título, charset, links para CSS/JS, SEO tags.'],
            ['&lt;body&gt;', 'Tudo que aparece na tela: textos, imagens, formulários, botões.'],
            ['&lt;!DOCTYPE html&gt;', 'Declara que o documento usa HTML5. Sempre na primeira linha.'],
            ['lang="pt-BR"', 'Define o idioma da página — importante para acessibilidade e SEO.'],
          ])
        )}
        ${sec('Meta tags essenciais',
          concepts([
            ['charset="UTF-8"', 'Define a codificação de caracteres — necessário para acentos e emojis.'],
            ['name="viewport"', 'Controla o zoom e escala em dispositivos móveis.'],
            ['name="description"', 'Descrição exibida nos resultados do Google.'],
            ['name="author"', 'Autor do documento.'],
          ])
        )}`
      },
      { id:'semantica', name:'Tags Semânticas',
        content: `
        <h2 class="tp-title">Tags Semânticas</h2>
        <p class="tp-sub">Tags semânticas dizem ao navegador e aos leitores de tela o que cada bloco de conteúdo representa — melhora acessibilidade, SEO e a leitura do código.</p>
        ${sec('Estrutura da página',
          code('html',
`<span class="ct">&lt;header&gt;</span>               <span class="cc">&lt;!-- topo: logo, nav principal --&gt;</span>
  <span class="ct">&lt;nav&gt;</span>               <span class="cc">&lt;!-- menu de navegação --&gt;</span>
    <span class="ct">&lt;ul&gt;</span>
      <span class="ct">&lt;li&gt;&lt;a</span> <span class="ca">href</span>=<span class="cv">"/"</span><span class="ct">&gt;</span>Home<span class="ct">&lt;/a&gt;&lt;/li&gt;</span>
    <span class="ct">&lt;/ul&gt;</span>
  <span class="ct">&lt;/nav&gt;</span>
<span class="ct">&lt;/header&gt;</span>

<span class="ct">&lt;main&gt;</span>                  <span class="cc">&lt;!-- conteúdo principal único da página --&gt;</span>
  <span class="ct">&lt;article&gt;</span>            <span class="cc">&lt;!-- conteúdo independente (post, card) --&gt;</span>
    <span class="ct">&lt;section&gt;</span>          <span class="cc">&lt;!-- agrupa conteúdo relacionado --&gt;</span>
      <span class="ct">&lt;h2&gt;</span>Título<span class="ct">&lt;/h2&gt;</span>
      <span class="ct">&lt;p&gt;</span>Texto...<span class="ct">&lt;/p&gt;</span>
    <span class="ct">&lt;/section&gt;</span>
  <span class="ct">&lt;/article&gt;</span>
  <span class="ct">&lt;aside&gt;</span>              <span class="cc">&lt;!-- conteúdo lateral / complementar --&gt;</span>
    <span class="ct">&lt;p&gt;</span>Widget...<span class="ct">&lt;/p&gt;</span>
  <span class="ct">&lt;/aside&gt;</span>
<span class="ct">&lt;/main&gt;</span>

<span class="ct">&lt;footer&gt;</span>               <span class="cc">&lt;!-- rodapé: links, copyright --&gt;</span>
  <span class="ct">&lt;p&gt;</span>&amp;copy; 2025<span class="ct">&lt;/p&gt;</span>
<span class="ct">&lt;/footer&gt;</span>`)
        )}
        ${sec('Quando usar cada tag',
          concepts([
            ['&lt;header&gt;', 'Cabeçalho da página ou de uma seção. Pode aparecer mais de uma vez.'],
            ['&lt;nav&gt;', 'Bloco de links de navegação principal ou secundária.'],
            ['&lt;main&gt;', 'Conteúdo principal da página. Só deve existir um por página.'],
            ['&lt;article&gt;', 'Conteúdo independente e reutilizável: post de blog, card de produto, tweet.'],
            ['&lt;section&gt;', 'Agrupa conteúdo tematicamente relacionado dentro de um article ou main.'],
            ['&lt;aside&gt;', 'Conteúdo lateral ou complementar ao conteúdo principal.'],
            ['&lt;footer&gt;', 'Rodapé da página ou de uma seção. Pode conter links, créditos, etc.'],
            ['&lt;figure&gt; / &lt;figcaption&gt;', 'Imagem, diagrama ou vídeo com sua legenda associada.'],
          ])
        )}
        ${sec('Dica',
          tip('<b>div vs section vs article:</b> Use &lt;div&gt; apenas para agrupar elementos por motivos de estilo/script — sem significado semântico. Use &lt;section&gt; quando o bloco de conteúdo tem um título. Use &lt;article&gt; quando o conteúdo faz sentido sozinho, fora do contexto da página.')
        )}`
      },
      { id:'texto', name:'Texto e Formatação',
        content: `
        <h2 class="tp-title">Texto e Formatação</h2>
        <p class="tp-sub">Tags de texto estruturam e enfatizam conteúdo. Escolher as tags certas melhora a semântica e acessibilidade.</p>
        ${sec('Hierarquia de títulos',
          txt('Use apenas um &lt;h1&gt; por página (título principal). Os demais formam a hierarquia de navegação do conteúdo.'),
          code('html',
`<span class="ct">&lt;h1&gt;</span>Título principal da página<span class="ct">&lt;/h1&gt;</span>
<span class="ct">&lt;h2&gt;</span>Seção de destaque<span class="ct">&lt;/h2&gt;</span>
<span class="ct">&lt;h3&gt;</span>Subseção<span class="ct">&lt;/h3&gt;</span>`)
        )}
        ${sec('Tags de texto inline',
          concepts([
            ['&lt;strong&gt;', 'Negrito semântico — indica importância. Leitores de tela entonação diferente.'],
            ['&lt;em&gt;', 'Itálico semântico — ênfase no conteúdo.'],
            ['&lt;b&gt; / &lt;i&gt;', 'Negrito e itálico visuais sem significado semântico. Prefira strong/em.'],
            ['&lt;mark&gt;', 'Texto destacado/marcado (fundo amarelo padrão).'],
            ['&lt;code&gt;', 'Código inline. Ex: "use o método <code>split()</code>".'],
            ['&lt;pre&gt;', 'Texto pré-formatado que preserva espaços e quebras de linha.'],
            ['&lt;br&gt;', 'Quebra de linha. Use raramente — prefira CSS para espaçamento.'],
            ['&lt;hr&gt;', 'Linha divisória temática entre conteúdos.'],
            ['&lt;blockquote&gt;', 'Citação longa de outra fonte.'],
            ['&lt;abbr&gt;', 'Abreviação com title explicando o significado.'],
          ])
        )}`
      },
      { id:'links', name:'Links e Mídia',
        content: `
        <h2 class="tp-title">Links e Mídia</h2>
        <p class="tp-sub">Links conectam páginas. Imagens e vídeos enriquecem o conteúdo — use sempre com atenção à acessibilidade.</p>
        ${sec('Links — &lt;a&gt;',
          code('html',
`<span class="cc">&lt;!-- Link externo --&gt;</span>
<span class="ct">&lt;a</span> <span class="ca">href</span>=<span class="cv">"https://google.com"</span> <span class="ca">target</span>=<span class="cv">"_blank"</span> <span class="ca">rel</span>=<span class="cv">"noopener"</span><span class="ct">&gt;</span>Google<span class="ct">&lt;/a&gt;</span>

<span class="cc">&lt;!-- Link interno --&gt;</span>
<span class="ct">&lt;a</span> <span class="ca">href</span>=<span class="cv">"/sobre"</span><span class="ct">&gt;</span>Sobre nós<span class="ct">&lt;/a&gt;</span>

<span class="cc">&lt;!-- Âncora (ir para seção) --&gt;</span>
<span class="ct">&lt;a</span> <span class="ca">href</span>=<span class="cv">"#contato"</span><span class="ct">&gt;</span>Ir para Contato<span class="ct">&lt;/a&gt;</span>

<span class="cc">&lt;!-- Link de e-mail / telefone --&gt;</span>
<span class="ct">&lt;a</span> <span class="ca">href</span>=<span class="cv">"mailto:email@site.com"</span><span class="ct">&gt;</span>Enviar e-mail<span class="ct">&lt;/a&gt;</span>
<span class="ct">&lt;a</span> <span class="ca">href</span>=<span class="cv">"tel:+5511999999999"</span><span class="ct">&gt;</span>Ligar<span class="ct">&lt;/a&gt;</span>`)
        )}
        ${sec('Imagens — &lt;img&gt;',
          code('html',
`<span class="cc">&lt;!-- alt é obrigatório para acessibilidade --&gt;</span>
<span class="ct">&lt;img</span> <span class="ca">src</span>=<span class="cv">"foto.jpg"</span> <span class="ca">alt</span>=<span class="cv">"Descrição da imagem"</span> <span class="ca">width</span>=<span class="cv">"800"</span> <span class="ca">height</span>=<span class="cv">"600"</span><span class="ct">&gt;</span>

<span class="cc">&lt;!-- loading="lazy" adia o carregamento de imagens fora da tela --&gt;</span>
<span class="ct">&lt;img</span> <span class="ca">src</span>=<span class="cv">"banner.webp"</span> <span class="ca">alt</span>=<span class="cv">"Banner"</span> <span class="ca">loading</span>=<span class="cv">"lazy"</span><span class="ct">&gt;</span>

<span class="cc">&lt;!-- Com legenda --&gt;</span>
<span class="ct">&lt;figure&gt;</span>
  <span class="ct">&lt;img</span> <span class="ca">src</span>=<span class="cv">"grafico.png"</span> <span class="ca">alt</span>=<span class="cv">"Gráfico de vendas 2024"</span><span class="ct">&gt;</span>
  <span class="ct">&lt;figcaption&gt;</span>Vendas cresceram 40% em 2024<span class="ct">&lt;/figcaption&gt;</span>
<span class="ct">&lt;/figure&gt;</span>`)
        )}
        ${sec('Vídeo e Áudio',
          code('html',
`<span class="ct">&lt;video</span> <span class="ca">controls</span> <span class="ca">width</span>=<span class="cv">"640"</span> <span class="ca">poster</span>=<span class="cv">"thumb.jpg"</span><span class="ct">&gt;</span>

  // ─────────────────────────────
  {
    id:'css', tag:'.css', name:'CSS', color:'#1d4ed8',
    desc:'Estilos e layout visual',
    topics: [
      { id:'seletores', name:'Seletores',
        content: `
        <h2 class="tp-title">Seletores</h2>
        <p class="tp-sub">Seletores apontam quais elementos HTML recebem determinado estilo. Dominar seletores é essencial para escrever CSS eficiente.</p>
        ${sec('Seletores básicos',
          code('css',
`<span class="cc">/* Tag — seleciona todos os elementos daquele tipo */</span>
<span class="cs">p</span> { <span class="cp">color</span>: <span class="cv">red</span>; }

<span class="cc">/* Classe — reutilizável em vários elementos */</span>
<span class="cs">.destaque</span> { <span class="cp">background</span>: <span class="cv">yellow</span>; }

<span class="cc">/* ID — único por página */</span>
<span class="cs">#menu</span> { <span class="cp">position</span>: <span class="cv">fixed</span>; }

<span class="cc">/* Universal — seleciona tudo */</span>
<span class="cs">*</span> { <span class="cp">box-sizing</span>: <span class="cv">border-box</span>; }

<span class="cc">/* Múltiplos — separe por vírgula */</span>
<span class="cs">h1, h2, h3</span> { <span class="cp">font-weight</span>: <span class="cv">bold</span>; }`)
        )}
        ${sec('Combinadores',
          code('css',
`<span class="cc">/* Descendente: qualquer p dentro de .card */</span>
<span class="cs">.card p</span> { <span class="cp">color</span>: <span class="cv">#555</span>; }

<span class="cc">/* Filho direto: apenas p diretamente dentro de .card */</span>
<span class="cs">.card > p</span> { <span class="cp">margin</span>: <span class="cv">0</span>; }

<span class="cc">/* Irmão adjacente: h2 imediatamente seguido de p */</span>
<span class="cs">h2 + p</span> { <span class="cp">margin-top</span>: <span class="cv">0</span>; }

<span class="cc">/* Irmãos gerais: todos os p depois de h2 */</span>
<span class="cs">h2 ~ p</span> { <span class="cp">color</span>: <span class="cv">#666</span>; }`)
        )}
        ${sec('Pseudo-classes',
          code('css',
`<span class="cs">a:hover</span>          { <span class="cp">color</span>: <span class="cv">blue</span>; }            <span class="cc">/* mouse em cima */</span>
<span class="cs">input:focus</span>      { <span class="cp">outline</span>: <span class="cv">2px solid blue</span>; } <span class="cc">/* campo focado */</span>
<span class="cs">button:active</span>    { <span class="cp">opacity</span>: <span class="cv">0.8</span>; }          <span class="cc">/* clicando */</span>
<span class="cs">a:visited</span>        { <span class="cp">color</span>: <span class="cv">purple</span>; }         <span class="cc">/* link já visitado */</span>

<span class="cs">li:first-child</span>   { <span class="cp">font-weight</span>: <span class="cv">bold</span>; }    <span class="cc">/* primeiro filho */</span>
<span class="cs">li:last-child</span>    { <span class="cp">margin-bottom</span>: <span class="cv">0</span>; }     <span class="cc">/* último filho */</span>
<span class="cs">li:nth-child(2)</span>  { <span class="cp">color</span>: <span class="cv">red</span>; }           <span class="cc">/* filho específico */</span>
<span class="cs">li:nth-child(odd)</span>{ <span class="cp">background</span>: <span class="cv">#f0f0f0</span>; } <span class="cc">/* filhos ímpares */</span>

<span class="cs">p:not(.especial)</span> { <span class="cp">opacity</span>: <span class="cv">0.7</span>; }        <span class="cc">/* todos exceto .especial */</span>`)
        )}
        ${sec('Pseudo-elementos',
          code('css',
`<span class="cc">/* Adiciona conteúdo antes/depois sem alterar o HTML */</span>
<span class="cs">.card::before</span> {
  <span class="cp">content</span>: <span class="cv">""</span>;
  <span class="cp">display</span>: <span class="cv">block</span>;
  <span class="cp">width</span>: <span class="cv">40px</span>;
  <span class="cp">height</span>: <span class="cv">3px</span>;
  <span class="cp">background</span>: <span class="cv">blue</span>;
}

<span class="cs">p::first-line</span>  { <span class="cp">font-weight</span>: <span class="cv">bold</span>; }       <span class="cc">/* primeira linha */</span>
<span class="cs">p::first-letter</span>{ <span class="cp">font-size</span>: <span class="cv">3rem</span>; }        <span class="cc">/* capitular */</span>
<span class="cs">::selection</span>    { <span class="cp">background</span>: <span class="cv">#fcd34d</span>; }   <span class="cc">/* texto selecionado */</span>
<span class="cs">::placeholder</span>  { <span class="cp">color</span>: <span class="cv">#aaa</span>; }            <span class="cc">/* placeholder do input */</span>`)
        )}`
      },
      { id:'boxmodel', name:'Box Model',
        content: `
        <h2 class="tp-title">Box Model</h2>
        <p class="tp-sub">Todo elemento HTML é uma caixa. Entender as camadas dessa caixa é fundamental para controlar tamanhos e espaçamentos.</p>
        ${sec('As 4 camadas — de dentro para fora',
          tip('<b>Content</b> → <b>Padding</b> → <b>Border</b> → <b>Margin</b><br><br>Content: o conteúdo em si (texto, imagem). Padding: espaço interno entre conteúdo e borda. Border: a borda (pode ter espessura, estilo, cor). Margin: espaço externo entre o elemento e os vizinhos.'),
          code('css',
`<span class="cs">.caixa</span> {
  <span class="cc">/* Tamanho do conteúdo */</span>
  <span class="cp">width</span>: <span class="cn">300</span>px;
  <span class="cp">height</span>: <span class="cn">150</span>px;

  <span class="cc">/* Espaço interno */</span>
  <span class="cp">padding</span>: <span class="cn">20</span>px;           <span class="cc">/* todos os lados */</span>
  <span class="cp">padding</span>: <span class="cn">10</span>px <span class="cn">20</span>px;       <span class="cc">/* vertical horizontal */</span>
  <span class="cp">padding</span>: <span class="cn">10</span>px <span class="cn">15</span>px <span class="cn">20</span>px <span class="cn">5</span>px; <span class="cc">/* top right bottom left */</span>

  <span class="cc">/* Borda */</span>
  <span class="cp">border</span>: <span class="cn">2</span>px solid <span class="cv">#333</span>;    <span class="cc">/* espessura estilo cor */</span>
  <span class="cp">border-radius</span>: <span class="cn">8</span>px;        <span class="cc">/* arredondar cantos */</span>
  <span class="cp">border-radius</span>: <span class="cv">50%</span>;         <span class="cc">/* círculo perfeito */</span>

  <span class="cc">/* Espaço externo */</span>
  <span class="cp">margin</span>: <span class="cn">20</span>px;
  <span class="cp">margin</span>: <span class="cn">0</span> auto;             <span class="cc">/* centralizar horizontalmente */</span>
}`)
        )}
        ${sec('box-sizing — a regra mais importante',
          txt('Por padrão, <code>width</code> define apenas o conteúdo. Padding e border <em>somam</em> ao tamanho total. Com <code>border-box</code>, padding e border são incluídos no width — muito mais intuitivo.'),
          code('css',
`<span class="cc">/* Coloque sempre no topo do seu CSS */</span>
<span class="cs">*, *::before, *::after</span> {
  <span class="cp">box-sizing</span>: <span class="cv">border-box</span>;
}

<span class="cc">/* Sem border-box: largura real = 300 + 40 + 4 = 344px */</span>
<span class="cs">.sem</span> { <span class="cp">width</span>: <span class="cn">300</span>px; <span class="cp">padding</span>: <span class="cn">20</span>px; <span class="cp">border</span>: <span class="cn">2</span>px solid; }

<span class="cc">/* Com border-box: largura real = 300px */</span>
<span class="cs">.com</span> { <span class="cp">box-sizing</span>: <span class="cv">border-box</span>; <span class="cp">width</span>: <span class="cn">300</span>px; <span class="cp">padding</span>: <span class="cn">20</span>px; <span class="cp">border</span>: <span class="cn">2</span>px solid; }`)
        )}
        ${sec('Outline vs Border',
          tip('<b>border</b> ocupa espaço e entra no box model. <b>outline</b> não ocupa espaço e fica fora do border — muito usado para indicar foco em inputs: <code>outline: 2px solid blue;</code> <code>outline-offset: 2px;</code>')
        )}`
      },
      { id:'tipografia', name:'Tipografia',
        content: `
        <h2 class="tp-title">Tipografia</h2>
        <p class="tp-sub">Tipografia bem feita melhora legibilidade e hierarquia visual. CSS oferece controle completo sobre texto.</p>
        ${sec('Propriedades de fonte',
          code('css',
`<span class="cs">body</span> {
  <span class="cc">/* Família de fontes — sempre termine com genérica */</span>
  <span class="cp">font-family</span>: <span class="cv">'Inter', Arial, sans-serif</span>;

  <span class="cc">/* Tamanho — prefira rem para acessibilidade */</span>
  <span class="cp">font-size</span>: <span class="cn">1</span>rem;          <span class="cc">/* 16px padrão */</span>
  <span class="cp">font-size</span>: <span class="cv">clamp</span>(<span class="cn">1</span>rem, <span class="cv">2.5vw</span>, <span class="cn">1.5</span>rem); <span class="cc">/* fluido! */</span>

  <span class="cc">/* Peso: 100=thin, 400=normal, 700=bold */</span>
  <span class="cp">font-weight</span>: <span class="cn">400</span>;

  <span class="cc">/* Estilo */</span>
  <span class="cp">font-style</span>: <span class="cv">italic</span>;

  <span class="cc">/* Altura da linha — ideal entre 1.5 e 1.8 para corpo */</span>
  <span class="cp">line-height</span>: <span class="cn">1.6</span>;
}`)
        )}
        ${sec('Propriedades de texto',
          code('css',
`<span class="cs">.paragrafo</span> {
  <span class="cp">text-align</span>: <span class="cv">left | center | right | justify</span>;
  <span class="cp">text-decoration</span>: <span class="cv">none | underline | line-through</span>;
  <span class="cp">text-transform</span>: <span class="cv">uppercase | lowercase | capitalize</span>;
  <span class="cp">text-indent</span>: <span class="cn">2</span>em;      <span class="cc">/* recuo na primeira linha */</span>
  <span class="cp">letter-spacing</span>: <span class="cv">.05</span>em; <span class="cc">/* espaço entre letras */</span>
  <span class="cp">word-spacing</span>: <span class="cn">4</span>px;     <span class="cc">/* espaço entre palavras */</span>
  <span class="cp">white-space</span>: <span class="cv">nowrap</span>;   <span class="cc">/* impede quebra de linha */</span>

  <span class="cc">/* Truncar texto com reticências */</span>
  <span class="cp">overflow</span>: <span class="cv">hidden</span>;
  <span class="cp">text-overflow</span>: <span class="cv">ellipsis</span>;
  <span class="cp">white-space</span>: <span class="cv">nowrap</span>;
}`)
        )}
        ${sec('Google Fonts — como importar',
          code('html',
`<span class="cc">&lt;!-- No &lt;head&gt; do HTML --&gt;</span>
<span class="ct">&lt;link</span> <span class="ca">href</span>=<span class="cv">"https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"</span> <span class="ca">rel</span>=<span class="cv">"stylesheet"</span><span class="ct">&gt;</span>`)
        )}`
      },
      { id:'cores', name:'Cores e Fundos',
        content: `
        <h2 class="tp-title">Cores e Fundos</h2>
        <p class="tp-sub">CSS oferece múltiplos formatos de cor e ferramentas poderosas para fundos — gradientes, imagens e muito mais.</p>
        ${sec('Formatos de cor',
          code('css',
`<span class="cs">.elemento</span> {
  <span class="cc">/* Nome */</span>
  <span class="cp">color</span>: <span class="cv">red</span>;

  <span class="cc">/* Hexadecimal (+ alpha) */</span>
  <span class="cp">color</span>: <span class="cv">#ff0000</span>;       <span class="cc">/* completo */</span>
  <span class="cp">color</span>: <span class="cv">#f00</span>;          <span class="cc">/* abreviado */</span>
  <span class="cp">color</span>: <span class="cv">#ff000080</span>;     <span class="cc">/* com 50% de opacidade */</span>

  <span class="cc">/* RGB e RGBA */</span>
  <span class="cp">color</span>: <span class="cv">rgb(255, 0, 0)</span>;
  <span class="cp">color</span>: <span class="cv">rgba(255, 0, 0, 0.5)</span>;

  <span class="cc">/* HSL — Hue, Saturation, Lightness (mais intuitivo) */</span>
  <span class="cp">color</span>: <span class="cv">hsl(0, 100%, 50%)</span>;     <span class="cc">/* vermelho */</span>
  <span class="cp">color</span>: <span class="cv">hsl(220, 80%, 60%)</span>;   <span class="cc">/* azul */</span>
  <span class="cp">color</span>: <span class="cv">hsla(220, 80%, 60%, 0.7)</span>;

  <span class="cc">/* oklch — moderno, perceptualmente uniforme */</span>
  <span class="cp">color</span>: <span class="cv">oklch(60% 0.15 240)</span>;
}`)
        )}
        ${sec('Propriedades de fundo',
          code('css',
`<span class="cs">.secao</span> {
  <span class="cp">background-color</span>: <span class="cv">#f0f0f0</span>;

  <span class="cc">/* Imagem de fundo */</span>
  <span class="cp">background-image</span>: <span class="cv">url('bg.jpg')</span>;
  <span class="cp">background-size</span>: <span class="cv">cover</span>;      <span class="cc">/* cover | contain | 100% */</span>
  <span class="cp">background-position</span>: <span class="cv">center</span>;
  <span class="cp">background-repeat</span>: <span class="cv">no-repeat</span>;
  <span class="cp">background-attachment</span>: <span class="cv">fixed</span>;<span class="cc">/* efeito parallax */</span>

  <span class="cc">/* Gradiente linear */</span>
  <span class="cp">background</span>: <span class="cv">linear-gradient(135deg, #667eea, #764ba2)</span>;
  <span class="cp">background</span>: <span class="cv">linear-gradient(to right, #f00, #00f)</span>;

  <span class="cc">/* Gradiente radial */</span>
  <span class="cp">background</span>: <span class="cv">radial-gradient(circle at center, #fff, #000)</span>;

  <span class="cc">/* Múltiplos fundos */</span>
  <span class="cp">background</span>:
    <span class="cv">url('icone.svg') top right no-repeat</span>,
    <span class="cv">linear-gradient(#e0f0ff, #fff)</span>;

  <span class="cc">/* Transparência do elemento inteiro */</span>
  <span class="cp">opacity</span>: <span class="cn">0.8</span>;
}`)
        )}`
      },
      { id:'flexbox', name:'Flexbox',
        content: `
        <h2 class="tp-title">Flexbox</h2>
        <p class="tp-sub">Flexbox é o sistema de layout unidimensional do CSS — alinha e distribui elementos em linha ou coluna com total controle.</p>
        ${sec('Ativando e configurando o container',
          code('css',
`<span class="cs">.container</span> {
  <span class="cp">display</span>: <span class="cv">flex</span>;              <span class="cc">/* ou inline-flex */</span>

  <span class="cp">flex-direction</span>: <span class="cv">row-reverse</span>;  <span class="cc">/* linha invertida */</span>

  <span class="cc">/* Quebra de linha */</span>
  <span class="cp">flex-wrap</span>: <span class="cv">nowrap</span>;   <span class="cc">/* padrão: não quebra */</span>
  <span class="cp">flex-wrap</span>: <span class="cv">wrap</span>;     <span class="cc">/* quebra para próxima linha */</span>

  <span class="cc">/* Alinhamento no eixo principal (horizontal em row) */</span>
  <span class="cp">justify-content</span>: <span class="cv">flex-start</span>;    <span class="cc">/* padrão */</span>
  <span class="cp">justify-content</span>: <span class="cv">flex-end</span>;
  <span class="cp">justify-content</span>: <span class="cv">center</span>;
  <span class="cp">justify-content</span>: <span class="cv">space-between</span>; <span class="cc">/* espaço entre itens */</span>
  <span class="cp">justify-content</span>: <span class="cv">space-around</span>;
  <span class="cp">justify-content</span>: <span class="cv">space-evenly</span>;

  <span class="cc">/* Alinhamento no eixo cruzado (vertical em row) */</span>
  <span class="cp">align-items</span>: <span class="cv">stretch</span>;     <span class="cc">/* padrão: estica */</span>
  <span class="cp">align-items</span>: <span class="cv">center</span>;      <span class="cc">/* centraliza */</span>
  <span class="cp">align-items</span>: <span class="cv">flex-start</span>;
  <span class="cp">align-items</span>: <span class="cv">flex-end</span>;
  <span class="cp">align-items</span>: <span class="cv">baseline</span>;    <span class="cc">/* alinha pela baseline do texto */</span>

  <span class="cc">/* Espaçamento entre itens */</span>
  <span class="cp">gap</span>: <span class="cn">1</span>rem;
  <span class="cp">gap</span>: <span class="cn">1</span>rem <span class="cn">2</span>rem; <span class="cc">/* row-gap column-gap */</span>

        )}
        ${sec('Propriedades dos filhos (flex items)',
          code('css',
`<span class="cs">.item</span> {
  <span class="cc">/* flex-grow: quanto o item cresce (0 = não cresce) */</span>
  <span class="cp">flex-grow</span>: <span class="cn">1</span>;

  <span class="cc">/* flex-shrink: quanto encolhe (1 = encolhe, 0 = não) */</span>

  <span class="cp">flex</span>: <span class="cv">0 0 200px</span>;     <span class="cc">/* tamanho fixo */</span>

  <span class="cc">/* Sobrescrever align-items só para este item */</span>

        )}

  <span class="cp">justify-content</span>: <span class="cv">center</span>;
  <span class="cp">align-items</span>: <span class="cv">center</span>;

      { id:'grid', name:'Grid',
        content: `

        ${sec('Definindo o grid',
          code('css',
`<span class="cs">.grid</span> {

  <span class="cc">/* Colunas explícitas */</span>

  <span class="cc">/* Linhas explícitas */</span>

  <span class="cc">/* Espaçamento */</span>

  <span class="cc">/* Alinhamento de todos os itens */</span>

        )}
        ${sec('Posicionamento dos itens',

`<span class="cs">.item-destaque</span> {

  <span class="cp">grid-column</span>: <span class="cv">1 / 3</span>;

  <span class="cc">/* Shorthand com span */</span>
  <span class="cp">grid-column</span>: <span class="cv">span 2</span>;   <span class="cc">/* ocupa 2 colunas */</span>
  <span class="cp">grid-column</span>: <span class="cv">1 / -1</span>;  <span class="cc">/* da primeira à última */</span>

  <span class="cc">/* Linhas */</span>
  <span class="cp">grid-row</span>: <span class="cv">1 / 3</span>;

  <span class="cc">/* Shorthand: grid-area: row-start / col-start / row-end / col-end */</span>

<span class="cc">/* Grid com áreas nomeadas */</span>
<span class="cs">.layout</span> {

<span class="cs">.header</span>  { <span class="cp">grid-area</span>: <span class="cv">header</span>; }
<span class="cs">.sidebar</span> { <span class="cp">grid-area</span>: <span class="cv">sidebar</span>; }
<span class="cs">.main</span>    { <span class="cp">grid-area</span>: <span class="cv">main</span>; }
<span class="cs">.footer</span>  { <span class="cp">grid-area</span>: <span class="cv">footer</span>; }`)
        )}`
      },
      { id:'position', name:'Posicionamento',
        content: `
        <h2 class="tp-title">Posicionamento</h2>
        <p class="tp-sub">A propriedade <code>position</code> controla como e onde um elemento é renderizado no fluxo da página.</p>
        ${sec('Valores de position',
          concepts([
            ['static', 'Padrão. Segue o fluxo normal do documento. top/left/etc não funcionam.'],
            ['relative', 'Permanece no fluxo, mas pode ser deslocado com top/left/right/bottom sem afetar outros.'],
            ['absolute', 'Sai do fluxo. Posiciona-se em relação ao ancestral com position ≠ static.'],
            ['fixed', 'Sai do fluxo. Posiciona-se em relação à viewport — fica fixo na tela ao rolar.'],
            ['sticky', 'Mistura de relative e fixed — fixo dentro do seu container ao rolar.'],
          ])
        )}
        ${sec('Exemplos práticos',
          code('css',
`<span class="cc">/* Relative: deslocar sem sair do fluxo */</span>
<span class="cs">.badge</span> {
  <span class="cp">position</span>: <span class="cv">relative</span>;
  <span class="cp">top</span>: <span class="cn">-2</span>px;  <span class="cc">/* sobe 2px, outros elementos não mudam */</span>
}

<span class="cc">/* Absolute: posicionar um ícone dentro de um container */</span>
<span class="cs">.container</span> { <span class="cp">position</span>: <span class="cv">relative</span>; } <span class="cc">/* pai vira referência */</span>
<span class="cs">.icone</span> {
  <span class="cp">position</span>: <span class="cv">absolute</span>;
  <span class="cp">top</span>: <span class="cn">1</span>rem; <span class="cp">right</span>: <span class="cn">1</span>rem;
}

<span class="cc">/* Fixed: header que fica no topo ao rolar */</span>
<span class="cs">.header</span> {

  <span class="cp">z-index</span>: <span class="cn">100</span>;  <span class="cc">/* fica acima de outros elementos */</span>

<span class="cc">/* Sticky: título de seção que gruda ao rolar */</span>
<span class="cs">.section-title</span> {

  <span class="cp">top</span>: <span class="cn">0</span>;   <span class="cc">/* gruda quando chega no topo */</span>
  <span class="cp">z-index</span>: <span class="cn">10</span>;
}`)
        )}`
      },
      { id:'transicoes', name:'Transições',
        content: `
        <h2 class="tp-title">Transições</h2>
        <p class="tp-sub">Transitions animam a mudança de um estado CSS para outro de forma suave — ao hover, ao adicionar uma classe, etc.</p>
        ${sec('Sintaxe básica',
          code('css',
`<span class="cs">.botao</span> {
  <span class="cp">background</span>: <span class="cv">#3b82f6</span>;
  <span class="cp">color</span>: <span class="cv">white</span>;
  <span class="cp">padding</span>: <span class="cn">.75</span>rem <span class="cn">1.5</span>rem;
  <span class="cp">border-radius</span>: <span class="cn">8</span>px;

  <span class="cc">/* transition: propriedade duração timing-function delay */</span>
  <span class="cp">transition</span>: <span class="cv">background 0.2s ease</span>;

  <span class="cc">/* Múltiplas propriedades */</span>
  <span class="cp">transition</span>:

  <span class="cc">/* Todas as propriedades (cuidado com performance) */</span>
  <span class="cp">transition</span>: <span class="cv">all 0.2s ease</span>;
}

<span class="cs">.botao:hover</span> {
  <span class="cp">background</span>: <span class="cv">#1d4ed8</span>;

      },
      { id:'animacoes', name:'Animações',

        <h2 class="tp-title">Animações CSS</h2>
        <p class="tp-sub">Animações CSS permitem definir sequências de estados com @keyframes — mais poderosas que transitions pois rodam automaticamente.</p>
        ${sec('@keyframes — definindo a animação',
          code('css',
`<span class="cc">/* Define a animação (dê um nome descritivo) */</span>
<span class="cs">@keyframes</span> <span class="cf">aparecer</span> {
  <span class="cv">from</span> {
    <span class="cp">opacity</span>: <span class="cn">0</span>;
    <span class="cp">transform</span>: <span class="cv">translateY(20px)</span>;
  }
  <span class="cv">to</span> {
    <span class="cp">opacity</span>: <span class="cn">1</span>;
    <span class="cp">transform</span>: <span class="cv">translateY(0)</span>;
  }
}

<span class="cc">/* Com múltiplos passos */</span>
<span class="cs">@keyframes</span> <span class="cf">pulsar</span> {
  <span class="cn">0%</span>   { <span class="cp">transform</span>: <span class="cv">scale(1)</span>; }
  <span class="cn">50%</span>  { <span class="cp">transform</span>: <span class="cv">scale(1.1)</span>; }
  <span class="cn">100%</span> { <span class="cp">transform</span>: <span class="cv">scale(1)</span>; }
}`)
        )}
        ${sec('Aplicando a animação',
          code('css',
`<span class="cs">.card</span> {
  <span class="cc">/* animation: nome duração timing delay iterações direção fill-mode */</span>
  <span class="cp">animation</span>: <span class="cv">aparecer 0.5s ease forwards</span>;

  <span class="cc">/* Separado */</span>
  <span class="cp">animation-name</span>: <span class="cv">aparecer</span>;
  <span class="cp">animation-duration</span>: <span class="cv">0.5s</span>;
  <span class="cp">animation-timing-function</span>: <span class="cv">ease</span>;
  <span class="cp">animation-delay</span>: <span class="cv">0.2s</span>;
  <span class="cp">animation-iteration-count</span>: <span class="cv">infinite | 1 | 3</span>;
  <span class="cp">animation-direction</span>: <span class="cv">normal | reverse | alternate</span>;

<span class="cc">/* Staggered — atrasos diferentes por filho */</span>

        )}`

        ${sec('Media Queries',

`<span class="cc">/* Mobile-first: estilos base para mobile, sobreponha para telas maiores */</span>
<span class="cs">.grid</span> { <span class="cp">grid-template-columns</span>: <span class="cv">1fr</span>; }

<span class="cs">@media (min-width: 640px)</span> {  <span class="cc">/* tablet pequeno */</span>

<span class="cs">@media (min-width: 1024px)</span> { <span class="cc">/* desktop */</span>

<span class="cc">/* Outros tipos de query */</span>
<span class="cs">@media (max-width: 768px)</span> { <span class="cc">/* desktop-first */</span> }
<span class="cs">@media (orientation: landscape)</span> { }

<span class="cs">@media (prefers-reduced-motion: reduce)</span> { } <span class="cc">/* sem animações */</span>`)

<span class="cc">/* Usando com var() */</span>

        ${sec('Declaração de variáveis',
          code('js',

`<span class="cc">// Para objetos (igual a interface)</span>
<span class="ck">type</span> <span class="cty">Produto</span> = {

};

<span class="cc">// Union — interface não consegue isso!</span>
<span class="ck">type</span> <span class="cty">ID</span> = <span class="cty">string | number</span>;
<span class="ck">type</span> <span class="cty">Status</span> = <span class="cv">'ativo'</span> | <span class="cv">'inativo'</span> | <span class="cv">'pendente'</span>;

<span class="cc">// Intersection — combina dois tipos</span>
<span class="ck">type</span> <span class="cty">AdminUsuario</span> = <span class="cty">Usuario</span> & { permissoes<span class="cty">: string[]</span> };

<span class="cc">// Quando usar qual?</span>
<span class="cc">// → interface: objetos e classes (extensível, preferida por libs)</span>
<span class="cc">// → type: unions, intersections, aliases de primitivos</span>`)

      { id:'generics', name:'Generics',
        content: `
        <h2 class="tp-title">Generics</h2>
        <p class="tp-sub">Generics permitem criar funções e tipos reutilizáveis que funcionam com qualquer tipo, mantendo a tipagem correta.</p>
        ${sec('Sintaxe básica',
          code('ts',
`<span class="cc">// Sem generic: perde a informação de tipo</span>
<span class="ck">function</span> <span class="cf">primeiro</span>(arr<span class="cty">: any[]</span>)<span class="cty">: any</span> { <span class="ck">return</span> arr[<span class="cn">0</span>]; }

<span class="cc">// Com generic: preserva o tipo!</span>
<span class="ck">function</span> <span class="cf">primeiro</span>&lt;<span class="cty">T</span>&gt;(arr<span class="cty">: T[]</span>)<span class="cty">: T</span> { <span class="ck">return</span> arr[<span class="cn">0</span>]; }

<span class="cf">primeiro</span>([<span class="cn">1</span>, <span class="cn">2</span>, <span class="cn">3</span>]);       <span class="cc">// retorno: number</span>
<span class="cf">primeiro</span>([<span class="cv">'a'</span>, <span class="cv">'b'</span>]);     <span class="cc">// retorno: string</span>

<span class="cc">// Constraints — limitar quais tipos aceitamos</span>
<span class="ck">function</span> <span class="cf">tamanho</span>&lt;<span class="cty">T extends</span> { length<span class="cty">: number</span> }&gt;(item<span class="cty">: T</span>) {

}

<span class="cc">// Generic em interface</span>
<span class="ck">interface</span> <span class="cty">Resposta</span>&lt;<span class="cty">T</span>&gt; {

}

<span class="ck">type</span> <span class="cty">RespostaUsuario</span> = <span class="cty">Resposta</span>&lt;<span class="cty">Usuario</span>&gt;;`)

      },
      { id:'utility', name:'Utility Types',
        content: `
        <h2 class="tp-title">Utility Types</h2>

        ${sec('Os mais usados',
          code('ts',
`<span class="ck">interface</span> <span class="cty">Usuario</span> {
  id<span class="cty">: number</span>;

<span class="cc">// Partial — todos os campos opcionais</span>
<span class="ck">type</span> <span class="cty">AtualizacaoUsuario</span> = <span class="cty">Partial</span>&lt;<span class="cty">Usuario</span>&gt;;

<span class="cc">// Required — todos obrigatórios (inverte Partial)</span>
<span class="ck">type</span> <span class="cty">UsuarioCompleto</span> = <span class="cty">Required</span>&lt;<span class="cty">Usuario</span>&gt;;

<span class="cc">// Readonly — campos imutáveis após criação</span>
<span class="ck">type</span> <span class="cty">UsuarioFinal</span> = <span class="cty">Readonly</span>&lt;<span class="cty">Usuario</span>&gt;;

<span class="cc">// Pick — seleciona campos específicos</span>
<span class="ck">type</span> <span class="cty">PerfilPublico</span> = <span class="cty">Pick</span>&lt;<span class="cty">Usuario</span>, <span class="cv">'id' | 'nome'</span>&gt;;

<span class="cc">// Omit — exclui campos específicos</span>
<span class="ck">type</span> <span class="cty">UsuarioSemSenha</span> = <span class="cty">Omit</span>&lt;<span class="cty">Usuario</span>, <span class="cv">'senha'</span>&gt;;

<span class="cc">// Record — mapeia chaves para um tipo</span>
<span class="ck">type</span> <span class="cty">PorId</span> = <span class="cty">Record</span>&lt;<span class="cty">number</span>, <span class="cty">Usuario</span>&gt;;

<span class="cc">// ReturnType — tipo de retorno de uma função</span>
<span class="ck">function</span> <span class="cf">getUser</span>() { <span class="ck">return</span> { nome: <span class="cv">'Ana'</span>, id: <span class="cn">1</span> }; }
<span class="ck">type</span> <span class="cty">UserReturn</span> = <span class="cty">ReturnType</span>&lt;<span class="ck">typeof</span> getUser&gt;;`)

      { id:'classes', name:'Classes e Enums',

        ${sec('Classes com TypeScript',

`<span class="ck">class</span> <span class="cty">Conta</span> {
  <span class="cc">// Modificadores de acesso</span>
  <span class="ck">public</span> titular<span class="cty">: string</span>;

        )}
        ${sec('Enums',

`<span class="cc">// Numeric enum (padrão)</span>
<span class="ck">enum</span> <span class="cty">Direcao</span> {

}
<span class="cty">Direcao</span>.Cima; <span class="cc">// 0</span>

<span class="cc">// String enum — mais legível em debug</span>
<span class="ck">enum</span> <span class="cty">Status</span> {

  },
  // ─────────────────────────────
  {
    id:'react', tag:'.jsx', name:'React', color:'#0e7490',
    desc:'Biblioteca de interfaces reativas',
    topics: [
      { id:'componentes', name:'Componentes e JSX',
        content: `
        <h2 class="tp-title">Componentes e JSX</h2>
        <p class="tp-sub">React é baseado em componentes — peças reutilizáveis de UI. JSX é a sintaxe que combina HTML com JavaScript.</p>
        ${sec('Componente funcional',
          code('jsx',
`<span class="cc">// Componente = função que retorna JSX</span>
<span class="ck">function</span> <span class="cf">Cartao</span>({ titulo, descricao }) {
  <span class="ck">return</span> (
    &lt;<span class="ct">div</span> <span class="ca">className</span>=<span class="cv">"cartao"</span>&gt;
      &lt;<span class="ct">h2</span>&gt;{titulo}&lt;/<span class="ct">h2</span>&gt;
      &lt;<span class="ct">p</span>&gt;{descricao}&lt;/<span class="ct">p</span>&gt;
    &lt;/<span class="ct">div</span>&gt;
  );
}

<span class="cc">// Usando o componente</span>
<span class="ck">function</span> <span class="cf">App</span>() {
  <span class="ck">return</span> (
    &lt;<span class="ct">main</span>&gt;
      &lt;<span class="cf">Cartao</span>
        <span class="ca">titulo</span>=<span class="cv">"Olá"</span>
        <span class="ca">descricao</span>=<span class="cv">"Meu primeiro componente"</span>
      /&gt;
    &lt;/<span class="ct">main</span>&gt;
  );
}`)
        )}
        ${sec('Regras do JSX',
          concepts([
            ['className', 'Use className no lugar de class (class é palavra reservada em JS).'],
            ['Um elemento raiz', 'O retorno deve ter um único elemento pai. Use <> </> (fragment) para evitar divs extras.'],
            ['Expressões em {}', 'Qualquer expressão JS vai entre chaves: {nome}, {2 + 2}, {condition && <el/>}'],
            ['style como objeto', 'style recebe um objeto JS: style={{ color: \'red\', fontSize: 16 }}'],
            ['Fechar tags', 'Tags sem filhos devem fechar: <img /> <br /> <Input />'],
            ['htmlFor', 'Use htmlFor no lugar do atributo for do label.'],
          ])
        )}`
      },
      { id:'props', name:'Props',
        content: `
        <h2 class="tp-title">Props</h2>
        <p class="tp-sub">Props são dados passados de componente pai para filho. São somente leitura — o filho nunca deve modificá-las.</p>
        ${sec('Passando e recebendo props',
          code('jsx',
`<span class="cc">// Pai passa props como atributos HTML</span>
<span class="ck">function</span> <span class="cf">App</span>() {
  <span class="ck">return</span> &lt;<span class="cf">Botao</span> <span class="ca">texto</span>=<span class="cv">"Enviar"</span> <span class="ca">cor</span>=<span class="cv">"azul"</span> <span class="ca">onClick</span>={<span class="cf">handleClick</span>} /&gt;;
}

<span class="cc">// Filho recebe via parâmetro (desestruture!)</span>
<span class="ck">function</span> <span class="cf">Botao</span>({ texto, cor, onClick }) {
  <span class="ck">return</span> (
    &lt;<span class="ct">button</span>
      <span class="ca">className</span>={<span class="cv">\`btn btn-\${cor}\`</span>}
      <span class="ca">onClick</span>={onClick}
    &gt;
      {texto}
    &lt;/<span class="ct">button</span>&gt;
  );
}

<span class="cc">// Props com valor padrão</span>
<span class="ck">function</span> <span class="cf">Botao</span>({ texto = <span class="cv">'Clique'</span>, cor = <span class="cv">'cinza'</span>, onClick }) { }

<span class="cc">// Prop children — conteúdo entre as tags</span>
<span class="ck">function</span> <span class="cf">Card</span>({ children }) {
  <span class="ck">return</span> &lt;<span class="ct">div</span> <span class="ca">className</span>=<span class="cv">"card"</span>&gt;{children}&lt;/<span class="ct">div</span>&gt;;
}
<span class="cc">// Uso: &lt;Card&gt;&lt;p&gt;Conteúdo&lt;/p&gt;&lt;/Card&gt;</span>`)
        )}`
      },
      { id:'state', name:'useState',
        content: `
        <h2 class="tp-title">useState</h2>
        <p class="tp-sub">useState adiciona estado ao componente. Quando o estado muda, o React re-renderiza o componente automaticamente.</p>
        ${sec('Sintaxe e uso básico',
          code('jsx',
`<span class="ck">import</span> { useState } <span class="ck">from</span> <span class="cv">'react'</span>;

<span class="ck">function</span> <span class="cf">Contador</span>() {
  <span class="cc">// [valorAtual, funçãoDeAtualização] = useState(valorInicial)</span>
  <span class="ck">const</span> [count, setCount] = <span class="cf">useState</span>(<span class="cn">0</span>);
  <span class="ck">const</span> [nome, setNome] = <span class="cf">useState</span>(<span class="cv">''</span>);
  <span class="ck">const</span> [aberto, setAberto] = <span class="cf">useState</span>(<span class="ck">false</span>);

  <span class="ck">return</span> (
    &lt;<span class="ct">div</span>&gt;
      &lt;<span class="ct">p</span>&gt;Contagem: {count}&lt;/<span class="ct">p</span>&gt;
      &lt;<span class="ct">button</span> <span class="ca">onClick</span>={() => <span class="cf">setCount</span>(count + <span class="cn">1</span>)}&gt;+&lt;/<span class="ct">button</span>&gt;
      &lt;<span class="ct">button</span> <span class="ca">onClick</span>={() => <span class="cf">setCount</span>(c => c - <span class="cn">1</span>)}&gt;-&lt;/<span class="ct">button</span>&gt;
      <span class="cc">// Forma funcional (garante valor mais recente)</span>
    &lt;/<span class="ct">div</span>&gt;
  );
}`)
        )}
        ${sec('Estado com objetos e arrays',
          code('jsx',
`<span class="cc">// Nunca mute o estado diretamente!</span>
<span class="ck">const</span> [usuario, setUsuario] = <span class="cf">useState</span>({ nome: <span class="cv">'Ana'</span>, idade: <span class="cn">28</span> });

<span class="cc">// Errado: mutação direta</span>
<span class="cc">// usuario.nome = 'João'; // não atualiza a UI!</span>

<span class="cc">// Certo: criar novo objeto com spread</span>
<span class="cf">setUsuario</span>({ ...usuario, nome: <span class="cv">'João'</span> });

<span class="cc">// Arrays: adicionar item</span>
<span class="ck">const</span> [items, setItems] = <span class="cf">useState</span>([]);
<span class="cf">setItems</span>(prev => [...prev, novoItem]);

<span class="cc">// Arrays: remover item</span>
<span class="cf">setItems</span>(prev => prev.<span class="cf">filter</span>(i => i.id !== id));`)
        )}`
      },
      { id:'effect', name:'useEffect',
        content: `
        <h2 class="tp-title">useEffect</h2>
        <p class="tp-sub">useEffect executa efeitos colaterais — buscar dados, eventos, timers — após o componente renderizar.</p>
        ${sec('Sintaxe e dependências',
          code('jsx',
`<span class="ck">import</span> { useEffect, useState } <span class="ck">from</span> <span class="cv">'react'</span>;

<span class="ck">function</span> <span class="cf">Perfil</span>({ userId }) {
  <span class="ck">const</span> [user, setUser] = <span class="cf">useState</span>(<span class="ck">null</span>);

  <span class="cc">// [] = roda só na montagem (componentDidMount)</span>
  <span class="cf">useEffect</span>(() => {
    document.title = <span class="cv">'Meu App'</span>;
  }, []);

  <span class="cc">// [userId] = roda quando userId muda</span>
  <span class="cf">useEffect</span>(() => {
    <span class="ck">async function</span> <span class="cf">buscar</span>() {
      <span class="ck">const</span> resp = <span class="ck">await</span> <span class="cf">fetch</span>(<span class="cv">\`/api/user/\${userId}\`</span>);
      <span class="ck">const</span> dados = <span class="ck">await</span> resp.<span class="cf">json</span>();
      <span class="cf">setUser</span>(dados);
    }
    <span class="cf">buscar</span>();
  }, [userId]);

  <span class="cc">// Cleanup — limpa antes do próximo efeito ou desmontagem</span>
  <span class="cf">useEffect</span>(() => {
    <span class="ck">const</span> id = <span class="cf">setInterval</span>(() => <span class="cf">console</span>.<span class="cf">log</span>(<span class="cv">'tick'</span>), <span class="cn">1000</span>);
    <span class="ck">return</span> () => <span class="cf">clearInterval</span>(id); <span class="cc">// cleanup!</span>
  }, []);

  <span class="ck">return</span> &lt;<span class="ct">div</span>&gt;{user?.nome}&lt;/<span class="ct">div</span>&gt;;
}`)
        )}`
      },
      { id:'hooks', name:'useRef, useMemo e useCallback',
        content: `
        <h2 class="tp-title">useRef, useMemo e useCallback</h2>
        <p class="tp-sub">Hooks para referências DOM, memorização de valores e memorização de funções — importantes para performance.</p>
        ${sec('useRef — referência que não causa re-render',
          code('jsx',
`<span class="ck">import</span> { useRef } <span class="ck">from</span> <span class="cv">'react'</span>;

<span class="ck">function</span> <span class="cf">Formulario</span>() {
  <span class="ck">const</span> inputRef = <span class="cf">useRef</span>(<span class="ck">null</span>);

  <span class="cc">// Acessar elemento DOM</span>
  <span class="ck">const</span> <span class="cf">focar</span> = () => inputRef.current.<span class="cf">focus</span>();

  <span class="cc">// Guardar valor sem re-render</span>
  <span class="ck">const</span> renderCount = <span class="cf">useRef</span>(<span class="cn">0</span>);
  renderCount.current++;

  <span class="ck">return</span> &lt;<span class="ct">input</span> <span class="ca">ref</span>={inputRef} /&gt;;
}`)
        )}
        ${sec('useMemo e useCallback',
          code('jsx',
`<span class="ck">import</span> { useMemo, useCallback } <span class="ck">from</span> <span class="cv">'react'</span>;

<span class="ck">function</span> <span class="cf">Lista</span>({ items, onDelete }) {
  <span class="cc">// useMemo — memoriza resultado de cálculo caro</span>
  <span class="ck">const</span> itemsOrdenados = <span class="cf">useMemo</span>(
    () => [...items].<span class="cf">sort</span>((a, b) => a.nome.<span class="cf">localeCompare</span>(b.nome)),
    [items] <span class="cc">// recalcula só quando items mudar</span>
  );

  <span class="cc">// useCallback — memoriza a função (evita re-render em filhos)</span>
  <span class="ck">const</span> <span class="cf">handleDelete</span> = <span class="cf">useCallback</span>(
    (id) => <span class="cf">onDelete</span>(id),
    [onDelete] <span class="cc">// recria só quando onDelete mudar</span>
  );

  <span class="ck">return</span> itemsOrdenados.<span class="cf">map</span>(item =>
    &lt;<span class="cf">Item</span> <span class="ca">key</span>={item.id} <span class="ca">item</span>={item} <span class="ca">onDelete</span>={handleDelete} /&gt;
  );
}`)
        )}`
      },
      { id:'context', name:'useContext',
        content: `
        <h2 class="tp-title">useContext</h2>
        <p class="tp-sub">Context evita prop drilling — compartilha dados com qualquer componente da árvore sem passar por cada nível.</p>
        ${sec('Criando e usando Context',
          code('jsx',
`<span class="ck">import</span> { createContext, useContext, useState } <span class="ck">from</span> <span class="cv">'react'</span>;

<span class="cc">// 1. Criar o contexto</span>
<span class="ck">const</span> TemaCtx = <span class="cf">createContext</span>(<span class="ck">null</span>);

<span class="cc">// 2. Provider envolve os componentes que precisam do dado</span>
<span class="ck">function</span> <span class="cf">TemaProvider</span>({ children }) {
  <span class="ck">const</span> [tema, setTema] = <span class="cf">useState</span>(<span class="cv">'claro'</span>);

  <span class="ck">return</span> (
    &lt;<span class="ct">TemaCtx.Provider</span> <span class="ca">value</span>={{ tema, setTema }}&gt;
      {children}
    &lt;/<span class="ct">TemaCtx.Provider</span>&gt;
  );
}

<span class="cc">// 3. Qualquer filho acessa o contexto</span>
<span class="ck">function</span> <span class="cf">BotaoTema</span>() {
  <span class="ck">const</span> { tema, setTema } = <span class="cf">useContext</span>(TemaCtx);
  <span class="ck">const</span> <span class="cf">alternar</span> = () => <span class="cf">setTema</span>(t => t === <span class="cv">'claro'</span> ? <span class="cv">'escuro'</span> : <span class="cv">'claro'</span>);

  <span class="ck">return</span> &lt;<span class="ct">button</span> <span class="ca">onClick</span>={alternar}&gt;Tema atual: {tema}&lt;/<span class="ct">button</span>&gt;;
}`)
        )}`
      },
      { id:'render', name:'Renderização e Listas',
        content: `
        <h2 class="tp-title">Renderização e Listas</h2>
        <p class="tp-sub">React renderiza condicionalmente com operadores JS e listas com .map(). A prop key é essencial para performance.</p>
        ${sec('Renderização condicional',
          code('jsx',
`<span class="ck">function</span> <span class="cf">Perfil</span>({ usuario, carregando, erro }) {
  <span class="cc">// Retorno antecipado</span>
  <span class="ck">if</span> (carregando) <span class="ck">return</span> &lt;<span class="ct">p</span>&gt;Carregando...&lt;/<span class="ct">p</span>&gt;;
  <span class="ck">if</span> (erro) <span class="ck">return</span> &lt;<span class="ct">p</span>&gt;Erro: {erro}&lt;/<span class="ct">p</span>&gt;;

  <span class="ck">return</span> (
    &lt;<span class="ct">div</span>&gt;
      <span class="cc">{/* && — renderiza se verdadeiro */}</span>
      {usuario.admin && &lt;<span class="ct">span</span>&gt;Admin&lt;/<span class="ct">span</span>&gt;}

      <span class="cc">{/* Ternário — A ou B */}</span>
      {usuario.ativo
        ? &lt;<span class="ct">span</span>&gt;Ativo&lt;/<span class="ct">span</span>&gt;
        : &lt;<span class="ct">span</span>&gt;Inativo&lt;/<span class="ct">span</span>&gt;
      }

      <span class="cc">{/* Nullish — valor alternativo */}</span>
      &lt;<span class="ct">p</span>&gt;{usuario.bio ?? <span class="cv">'Sem bio'</span>}&lt;/<span class="ct">p</span>&gt;
    &lt;/<span class="ct">div</span>&gt;
  );
}`)
        )}
        ${sec('Listas com .map()',
          code('jsx',
`<span class="ck">function</span> <span class="cf">ListaProdutos</span>({ produtos }) {
  <span class="ck">return</span> (
    &lt;<span class="ct">ul</span>&gt;
      {produtos.<span class="cf">map</span>(produto => (
        <span class="cc">{/* key deve ser único e estável — use id, nunca index */}</span>
        &lt;<span class="ct">li</span> <span class="ca">key</span>={produto.id}&gt;
          &lt;<span class="ct">span</span>&gt;{produto.nome}&lt;/<span class="ct">span</span>&gt;
          &lt;<span class="ct">span</span>&gt;R$ {produto.preco.<span class="cf">toFixed</span>(<span class="cn">2</span>)}&lt;/<span class="ct">span</span>&gt;
        &lt;/<span class="ct">li</span>&gt;
      ))}
    &lt;/<span class="ct">ul</span>&gt;
  );
}

<span class="cc">// Fragment — agrupa sem div extra</span>
<span class="ck">return</span> (
  &lt;&gt;
    &lt;<span class="ct">h1</span>&gt;Título&lt;/<span class="ct">h1</span>&gt;
    &lt;<span class="ct">p</span>&gt;Conteúdo&lt;/<span class="ct">p</span>&gt;
  &lt;/&gt;
);`)
        )}`
      },
    ]
  },
];

// ─────────────────────────────
// RENDER HOME
// ─────────────────────────────
const grid = document.getElementById('langGrid');
langs.forEach(lang => {
  const card = document.createElement('div');
  card.className = 'lang-card';
  card.style.setProperty('--lang', lang.color);
  card.innerHTML = `
    <div class="lc-tag">${lang.tag}</div>
    <div class="lc-name">${lang.name}</div>
    <div class="lc-desc">${lang.desc}</div>
    <span class="lc-arrow">↗</span>
  `;
  card.onclick = () => openLang(lang);
  grid.appendChild(card);
});

// ─────────────────────────────
// NAVIGATION
// ─────────────────────────────
function openLang(lang) {
  document.body.style.setProperty('--lang', lang.color);
  document.getElementById('detDot').style.background = lang.color;
  document.getElementById('detName').textContent = lang.name;

  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('contentArea');

  sidebar.innerHTML = `<span class="sb-label">Tópicos</span>`;
  content.innerHTML = '';

  lang.topics.forEach((topic, i) => {
    const item = document.createElement('div');
    item.className = 'sb-item' + (i === 0 ? ' active' : '');
    item.innerHTML = `<span class="sb-num">0${i+1}</span>${topic.name}`;
    item.onclick = () => switchTopic(topic.id, item);
    sidebar.appendChild(item);

    const panel = document.createElement('div');
    panel.className = 'topic-panel' + (i === 0 ? ' active' : '');
    panel.id = 'tp-' + topic.id;
    panel.innerHTML = topic.content;
    content.appendChild(panel);
  });

  document.getElementById('home').style.display = 'none';
  const det = document.getElementById('detail');
  det.classList.add('active');
  content.scrollTo(0, 0);
}

function switchTopic(id, item) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.topic-panel').forEach(p => p.classList.remove('active'));
  item.classList.add('active');
  document.getElementById('tp-' + id).classList.add('active');
  document.getElementById('contentArea').scrollTo(0, 0);
}

function goHome() {
  document.getElementById('detail').classList.remove('active');
  const home = document.getElementById('home');
  home.style.display = 'flex';
  home.style.animation = 'none';
  void home.offsetWidth;
  home.style.animation = 'fadeIn .3s ease';
}
</script>
</body>
</html>
